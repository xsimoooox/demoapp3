<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Terranova</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
</head>

<body>
  <div class="gaia-title">
    <span class="gaia-text">terra</span><span class="eye-text">nova</span>
  </div>
  <div class="instruction-text">Click on Earth to continue >></div>

  <div id="security-overlay" class="hidden">
    <div class="security-card">
      <h2>Accès sécurisé à la carte</h2>
      <div class="security-field">
        <label for="email">📧 Email</label>
        <input type="email" id="email" placeholder="votre@email.com">
      </div>
      <div class="security-field">
        <label for="access-code">🔑 Code d'accès</label>
        <input type="password" id="access-code" placeholder="••••••••">
      </div>
      <button class="access-btn" id="access-btn">Accéder à la carte</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r69/three.min.js"></script>
  <script src="scripts/threex.atmospherematerial.js"></script>
  <!-- Stats.js removed -->
  <script src="scripts/trackball-controls.js"></script>
  <script src="scripts/axes.js"></script>
  <script src="scripts/main.js"></script>
</body>

</html>
